name: Scheduled Ingest

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGODB_DB: ${{ secrets.MONGODB_DB || 'newspulse' }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "MONGODB_URI=$MONGODB_URI" > .env
          echo "MONGODB_DB=$MONGODB_DB" >> .env

      - name: Fetch articles
        run: python scraper/scraper.py

      - name: Cluster articles
        run: python scraper/cluster.py
